name: Deploy Firebase live

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: firebase-hosting-live
  cancel-in-progress: true

jobs:
  test_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Run checks
        run: npm run check
      - name: Deploy live
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KLINTO_STUDIO }}
          channelId: live
          projectId: klinto-studio
